name: Feature request
description: Suggest an improvement for ViewGrid
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / scenario
      description: What are you trying to build with ViewGrid?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
